<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Method Grid Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #1a1a1a; color: #eee;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 14px;
}
#main-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
  pointer-events: none;
}
#layout {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; z-index: 1;
}

#prompt-panel {
  flex: 0 0 auto;
  background: rgba(20,20,20,0.96);
  padding: 10px 18px; border-bottom: 1px solid #333;
  max-height: 28vh; overflow-y: auto;
}
#prompt-full {
  font-size: 14px; font-weight: 600; color: #fff;
  margin-bottom: 4px; line-height: 1.35;
}
#prompt-parts {
  font-size: 12px; color: #bbb; line-height: 1.4;
  margin: 2px 0 0 0; list-style: none;
}
#prompt-parts li { margin-left: 0; }
.part-toggle-label {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 2px 0; cursor: pointer;
}
.part-toggle {
  flex: 0 0 auto; width: 13px; height: 13px; margin-top: 2px;
  accent-color: #2a64d6; cursor: pointer;
}
.part-toggle:focus-visible { outline: 2px solid #cfe1ff; outline-offset: 2px; }
.part-toggle-text { display: block; }
.part-toggle-text b { color: #eee; }
.part-full-label {
  display: flex; align-items: center; gap: 8px;
  padding: 2px 0; cursor: pointer; font-size: 12px; color: #bbb;
}
.part-full-label b { color: #eee; }

#instruction {
  background: #1f3a5f; color: #cfe1ff; font-size: 12px;
  padding: 6px 18px; border-bottom: 1px solid #333;
  flex: 0 0 auto;
}

#grid {
  flex: 1 1 auto;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(2, 1fr);
  gap: 1px;
  background: transparent;
  min-height: 0;
}
.cell {
  position: relative;
  background: transparent;
  overflow: hidden;
}
/* Full-mode single overlay */
.cell-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  cursor: grab;
}
.cell-overlay:active { cursor: grabbing; }
/* Part-mode sub-overlays — positioned by JS */
.part-overlay {
  position: absolute;
  cursor: grab;
}
.part-overlay:active { cursor: grabbing; }
/* Part label inside sub-cell */
.part-sub-label {
  position: absolute; bottom: 4px; left: 0; right: 0;
  text-align: center; font-size: 10px; color: rgba(255,255,255,0.7);
  pointer-events: none; user-select: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  padding: 0 4px;
}
.cell-label {
  position: absolute; top: 8px; left: 8px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff;
  background: rgba(42,100,214,0.85);
  border-radius: 4px;
  pointer-events: none;
  user-select: none;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  z-index: 2;
}
/* Divider lines between part sub-cells */
.part-divider-h {
  position: absolute; left: 0; right: 0; height: 1px;
  background: rgba(255,255,255,0.15);
  pointer-events: none; z-index: 3;
}
.part-divider-v {
  position: absolute; top: 0; bottom: 0; width: 1px;
  background: rgba(255,255,255,0.15);
  pointer-events: none; z-index: 3;
}

#status {
  position: fixed; bottom: 6px; left: 12px; font-size: 11px; color: #888;
  z-index: 100; pointer-events: none;
}
#error {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  background: #2a1a1a; color: #ff9b9b; padding: 16px 24px; border-radius: 6px;
  z-index: 200; max-width: 80%; display: none;
}
</style>
</head>
<body>

<canvas id="main-canvas"></canvas>

<div id="layout">
  <div id="prompt-panel">
    <div id="prompt-full">Loading…</div>
    <ul id="prompt-parts"></ul>
  </div>
  <div id="instruction">Inspect all six textured meshes (<b>A</b>–<b>F</b>) below. Use the <b>Full</b> / <b>Part</b> radio buttons above to toggle between the complete mesh and per-part sub-views; drag any mesh to rotate and all six views stay synchronized. Use the rank chips beneath this viewer to rank from BEST to WORST.</div>
  <div id="grid"></div>
</div>

<div id="status">Loading…</div>
<div id="error"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

// ── Param parsing & validation ──
const params = new URLSearchParams(window.location.search);
const hitId = params.get('hitId');
const trialIdxStr = params.get('i');

const HIT_ID_RE = /^H_(?:[0-9]{4}|TUTORIAL)$/;
const DIR_RE = /^[A-Za-z0-9_]+\/[a-f0-9]{16}$/;
const VALID_SLOTS = ['A','B','C','D','E','F'];

function fail(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('status').textContent = 'Error';
  throw new Error(msg);
}

if (!hitId || !HIT_ID_RE.test(hitId)) fail('Bad hitId param');
const trialIdx = parseInt(trialIdxStr, 10);
if (!Number.isInteger(trialIdx) || trialIdx < 0 || trialIdx > 100) fail('Bad i param');

// ── Fetch & validate trial ──
const trialMap = await fetch('trialMap.json').then(r => {
  if (!r.ok) throw new Error('trialMap fetch failed: ' + r.status);
  return r.json();
});
const myTrials = trialMap[hitId];
if (!Array.isArray(myTrials)) fail('Unknown hitId: ' + hitId);
if (trialIdx >= myTrials.length) fail('Trial index out of range');
const trial = myTrials[trialIdx];

if (!trial || typeof trial !== 'object') fail('Invalid trial entry');
if (!trial.prompt || typeof trial.prompt.FULL !== 'string') fail('Missing prompt.FULL');
if (!Array.isArray(trial.prompt.parts)) fail('Missing prompt.parts');
if (!Array.isArray(trial.slots) || trial.slots.length !== 6) fail('Bad slots length');

const slotsSeen = new Set();
for (const s of trial.slots) {
  if (!s || !VALID_SLOTS.includes(s.slot)) fail('Bad slot id: ' + JSON.stringify(s));
  if (slotsSeen.has(s.slot)) fail('Duplicate slot: ' + s.slot);
  slotsSeen.add(s.slot);
  if (typeof s.dir !== 'string' || !DIR_RE.test(s.dir)) fail('Bad dir: ' + s.dir);
}
if (slotsSeen.size !== 6) fail('Missing slot');

const sample = trial.slots[0].dir.split('/')[0];
for (const s of trial.slots) {
  if (s.dir.split('/')[0] !== sample) fail('Slots span multiple samples');
}

const promptFull = trial.prompt.FULL;
const parts = [];
const partLabels = new Set();
for (const p of trial.prompt.parts) {
  if (!p || typeof p.label !== 'string' || typeof p.caption !== 'string') {
    fail('Invalid prompt part entry');
  }
  if (partLabels.has(p.label)) fail('Duplicate prompt part: ' + p.label);
  partLabels.add(p.label);
  parts.push(p);
}

async function loadClassFaceMap(sampleName) {
  const url = `data/${sampleName}/class_faces_gt.json`;
  const response = await fetch(url);
  if (!response.ok) {
    fail(`Missing required part face map for ${sampleName}: ${url}`);
  }
  let data;
  try {
    data = await response.json();
  } catch (e) {
    fail(`Invalid part face map JSON for ${sampleName}`);
  }
  if (!data || typeof data !== 'object' || Array.isArray(data)) {
    fail(`Invalid part face map for ${sampleName}`);
  }
  for (const p of parts) {
    const faces = data[p.label];
    if (!Array.isArray(faces)) {
      fail(`Missing face list for part "${p.label}" in ${sampleName}`);
    }
    if (faces.length === 0 || !faces.every(n => Number.isInteger(n) && n >= 0)) {
      fail(`Invalid face list for part "${p.label}" in ${sampleName}`);
    }
  }
  return data;
}

const classFaceMap = await loadClassFaceMap(sample);
// false = Full mode; true = Part mode (per-part sub-cameras)
let showParts = false;

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Render prompt header ──
document.getElementById('prompt-full').textContent = promptFull;
const partsUl = document.getElementById('prompt-parts');
partsUl.innerHTML = '';

// Build radio row helper
function makeRadioItem(value, labelClass, labelHTML, defaultChecked, onChange) {
  const li = document.createElement('li');
  const lbl = document.createElement('label');
  lbl.className = labelClass;
  const radio = document.createElement('input');
  radio.type = 'radio';
  radio.name = 'part-select';
  radio.className = 'part-toggle';
  radio.value = value;
  radio.checked = defaultChecked;
  radio.setAttribute('aria-label', labelHTML.replace(/<[^>]+>/g, ''));
  radio.addEventListener('change', () => { if (radio.checked) onChange(); });
  const text = document.createElement('span');
  text.innerHTML = labelHTML;
  lbl.appendChild(radio);
  lbl.appendChild(text);
  li.appendChild(lbl);
  return li;
}

// "Full" radio — default selected
partsUl.appendChild(makeRadioItem('full', 'part-full-label', '<b>Full</b>', true, () => {
  showParts = false; applyMode();
}));

// "Part" radio — splits each cell into per-part sub-cameras
{
  const partLi = makeRadioItem('parts', 'part-full-label', '<b>Part</b>', false, () => {
    showParts = true; applyMode();
  });
  partsUl.appendChild(partLi);

  // Part-by-part prompts indented below the Part radio
  const subUl = document.createElement('ul');
  subUl.style.cssText = 'list-style:none; margin: 2px 0 0 22px; padding: 0;';
  for (const p of parts) {
    const subLi = document.createElement('li');
    subLi.style.cssText = 'padding: 1px 0; font-size: 11px; color: #aaa;';
    subLi.innerHTML = `<b style="color:#ddd">${escapeHtml(p.label)}:</b> ${escapeHtml(p.caption)}`;
    subUl.appendChild(subLi);
  }
  partsUl.appendChild(subUl);
}

// ── Render 3x2 grid cells in server slot order (A..F) ──
const gridEl = document.getElementById('grid');
gridEl.innerHTML = '';
for (const s of trial.slots) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.dataset.slot = s.slot;
  cell.dataset.dir = s.dir;
  cell.innerHTML = `
    <div class="cell-label">${s.slot}</div>
    <div class="cell-overlay"></div>
  `;
  gridEl.appendChild(cell);
}

// ── Three.js renderer + scene infra ──
const canvas = document.getElementById('main-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const statusEl = document.getElementById('status');
// cells[i] = { scene, fullCamera, fullControls, fullOverlayEl, cellEl, meshGroup, partCameras, slotName }
// partCameras[j] = { camera, partScene, partGroup, bbox, overlayEl, labelEl }
// In Part mode all part cameras share one OrbitControls on a hidden dummy element.
let cells = [];
let activeCellFull = null;   // cell being dragged in Full mode
// Shared part-mode orbit state — one dummy OrbitControls drives all part cameras
let partMasterCamera = null;
let partMasterControls = null;
let partMasterDummy = null;  // invisible DOM element that receives pointer events for the master
let globalBBox = null;
const ambientIntensity = 0.8;

// ── Compute grid layout (rows × cols) as close to square as possible ──
function partGridLayout(N, cellW, cellH) {
  if (N <= 0) return { rows: 1, cols: 1 };
  const aspect = cellW / cellH;  // cell width/height ratio
  // Find cols that minimises |subW/subH - 1| (squareness)
  let bestCols = 1, bestScore = Infinity;
  for (let c = 1; c <= N; c++) {
    const r = Math.ceil(N / c);
    const subW = cellW / c;
    const subH = cellH / r;
    const score = Math.abs(subW / subH - 1);
    if (score < bestScore) { bestScore = score; bestCols = c; }
  }
  return { rows: Math.ceil(N / bestCols), cols: bestCols };
}

function computeSmoothNormals(geometry) {
  const pos = geometry.attributes.position;
  const count = pos.count;
  const numFaces = Math.floor(count / 3);
  const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
  const e1 = new THREE.Vector3(), e2 = new THREE.Vector3(), fn = new THREE.Vector3();
  const faceNormals = [];
  for (let f = 0; f < numFaces; f++) {
    vA.fromBufferAttribute(pos, f*3);
    vB.fromBufferAttribute(pos, f*3+1);
    vC.fromBufferAttribute(pos, f*3+2);
    e1.subVectors(vB, vA);
    e2.subVectors(vC, vA);
    fn.crossVectors(e1, e2).normalize();
    faceNormals.push(fn.clone());
  }
  const posMap = new Map();
  const prec = 1e5;
  for (let i = 0; i < count; i++) {
    const key = `${Math.round(pos.array[i*3]*prec)},${Math.round(pos.array[i*3+1]*prec)},${Math.round(pos.array[i*3+2]*prec)}`;
    if (!posMap.has(key)) posMap.set(key, []);
    posMap.get(key).push(i);
  }
  const normals = new Float32Array(count * 3);
  const avg = new THREE.Vector3();
  for (const indices of posMap.values()) {
    avg.set(0, 0, 0);
    for (const idx of indices) avg.add(faceNormals[Math.floor(idx/3)]);
    avg.normalize();
    for (const idx of indices) {
      normals[idx*3]   = avg.x;
      normals[idx*3+1] = avg.y;
      normals[idx*3+2] = avg.z;
    }
  }
  geometry.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
}

async function loadMesh(objPath, mtlPath) {
  const group = await new Promise((resolve, reject) => {
    const dir = mtlPath.substring(0, mtlPath.lastIndexOf('/') + 1);
    const file = mtlPath.substring(mtlPath.lastIndexOf('/') + 1);
    const ml = new MTLLoader();
    ml.setPath(dir);
    ml.load(
      file,
      (mats) => {
        mats.preload();
        const ol = new OBJLoader();
        ol.setMaterials(mats);
        ol.load(objPath, resolve, undefined, reject);
      },
      undefined,
      () => { new OBJLoader().load(objPath, resolve, undefined, reject); },
    );
  });
  group.traverse(child => {
    if (child.isMesh) {
      if (!child.geometry.index && child.geometry.attributes.position) {
        computeSmoothNormals(child.geometry);
      } else {
        child.geometry.computeVertexNormals();
      }
      if (child.material) child.material.side = THREE.DoubleSide;
    }
  });
  return group;
}

function cloneMeshMaterial(material) {
  if (Array.isArray(material)) return material.map(m => m ? m.clone() : m);
  return material ? material.clone() : new THREE.MeshStandardMaterial({ color: 0xcccccc, side: THREE.DoubleSide });
}

function setDoubleSide(material) {
  if (Array.isArray(material)) {
    for (const m of material) if (m) m.side = THREE.DoubleSide;
  } else if (material) {
    material.side = THREE.DoubleSide;
  }
}

function extractPart(originalGroup, faceIndices) {
  const group = new THREE.Group();
  const faceSet = new Set(faceIndices);
  let offset = 0;

  originalGroup.updateMatrixWorld(true);
  originalGroup.traverse(child => {
    if (!child.isMesh) return;
    const geometry = child.geometry;
    const isIndexed = geometry.index !== null;
    const faceCount = isIndexed
      ? Math.floor(geometry.index.count / 3)
      : Math.floor(geometry.attributes.position.count / 3);

    if (isIndexed) {
      const originalIndex = geometry.index.array;
      const nextIndex = [];
      for (let face = 0; face < faceCount; face++) {
        if (!faceSet.has(face + offset)) continue;
        const base = face * 3;
        nextIndex.push(originalIndex[base], originalIndex[base + 1], originalIndex[base + 2]);
      }
      if (nextIndex.length) {
        const nextGeometry = geometry.clone();
        nextGeometry.setIndex(new THREE.BufferAttribute(new Uint32Array(nextIndex), 1));
        nextGeometry.computeVertexNormals();
        const material = cloneMeshMaterial(child.material);
        setDoubleSide(material);
        const mesh = new THREE.Mesh(nextGeometry, material);
        mesh.matrixAutoUpdate = false;
        mesh.matrix.copy(child.matrixWorld);
        group.add(mesh);
      }
    } else {
      const positions = geometry.attributes.position;
      const uvs = geometry.attributes.uv;
      const selectedFaces = [];
      for (let face = 0; face < faceCount; face++) {
        if (faceSet.has(face + offset)) selectedFaces.push(face);
      }
      if (selectedFaces.length) {
        const vertexCount = selectedFaces.length * 3;
        const nextPositions = new Float32Array(vertexCount * 3);
        const nextUvs = uvs ? new Float32Array(vertexCount * 2) : null;
        for (let i = 0; i < selectedFaces.length; i++) {
          const face = selectedFaces[i];
          for (let vertex = 0; vertex < 3; vertex++) {
            const src = face * 3 + vertex;
            const dst = i * 3 + vertex;
            nextPositions[dst * 3] = positions.array[src * 3];
            nextPositions[dst * 3 + 1] = positions.array[src * 3 + 1];
            nextPositions[dst * 3 + 2] = positions.array[src * 3 + 2];
            if (nextUvs) {
              nextUvs[dst * 2] = uvs.array[src * 2];
              nextUvs[dst * 2 + 1] = uvs.array[src * 2 + 1];
            }
          }
        }
        const nextGeometry = new THREE.BufferGeometry();
        nextGeometry.setAttribute('position', new THREE.BufferAttribute(nextPositions, 3));
        if (nextUvs) nextGeometry.setAttribute('uv', new THREE.BufferAttribute(nextUvs, 2));
        computeSmoothNormals(nextGeometry);
        const material = cloneMeshMaterial(child.material);
        setDoubleSide(material);
        const mesh = new THREE.Mesh(nextGeometry, material);
        mesh.matrixAutoUpdate = false;
        mesh.matrix.copy(child.matrixWorld);
        group.add(mesh);
      }
    }
    offset += faceCount;
  });

  return group;
}

function partGroupHasMesh(group) {
  let hasMesh = false;
  group.traverse(child => { if (child.isMesh) hasMesh = true; });
  return hasMesh;
}

function bboxOfGroup(group) {
  // Temporarily make visible to compute bbox
  const wasVisible = group.visible;
  group.visible = true;
  const bbox = new THREE.Box3().setFromObject(group);
  group.visible = wasVisible;
  return bbox;
}

function createScene() {
  const scene = new THREE.Scene();
  scene.add(new THREE.HemisphereLight(0x87CEEB, 0x362e1e, ambientIntensity));
  const sun  = new THREE.DirectionalLight(0xfff4e0, 1.0); sun.position.set(5, 8, 6);   scene.add(sun);
  const fill = new THREE.DirectionalLight(0xc0d8ff, 0.4); fill.position.set(-4, 2, -3); scene.add(fill);
  const rim  = new THREE.DirectionalLight(0xffffff, 0.2); rim.position.set(0, -3, -5); scene.add(rim);
  return scene;
}

function makeCameraForBBox(bbox) {
  const center = bbox.getCenter(new THREE.Vector3());
  const size   = bbox.getSize(new THREE.Vector3()).length();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.001, 1000);
  camera.position.set(center.x, center.y, center.z + size * 1.2);
  camera.lookAt(center);
  return { camera, center, size };
}

function createCell(meshGroup, cellEl, slotName) {
  const scene = createScene();
  meshGroup.visible = true;
  scene.add(meshGroup);

  // Full-mode camera + controls
  const { camera: fullCamera, center: fullCenter } = makeCameraForBBox(globalBBox);
  const fullOverlayEl = cellEl.querySelector('.cell-overlay');
  const fullControls = new OrbitControls(fullCamera, fullOverlayEl);
  fullControls.target.copy(fullCenter);
  fullControls.enableDamping = true;
  fullControls.dampingFactor = 0.1;
  fullControls.update();

  fullOverlayEl.addEventListener('pointerdown', () => { activeCellFull = cellObj; });

  // Per-part cameras — each has its own scene; NO per-part OrbitControls
  // (all part cameras are driven by the shared partMasterControls)
  const partCameras = [];
  for (let pi = 0; pi < parts.length; pi++) {
    const p = parts[pi];
    const partGroup = extractPart(meshGroup, classFaceMap[p.label]);
    if (!partGroupHasMesh(partGroup)) {
      fail(`No mesh faces extracted for part "${p.label}" in panel ${slotName}`);
    }
    const partScene = createScene();
    partScene.add(partGroup);

    const partBBox = bboxOfGroup(partGroup);
    const { camera: partCamera } = makeCameraForBBox(
      partBBox.isEmpty() ? globalBBox : partBBox
    );

    // Overlay div — positioned by layoutPartOverlays; forwards pointer to master
    const overlayEl = document.createElement('div');
    overlayEl.className = 'part-overlay';
    overlayEl.style.display = 'none';
    cellEl.appendChild(overlayEl);

    const labelEl = document.createElement('div');
    labelEl.className = 'part-sub-label';
    labelEl.textContent = p.label;
    labelEl.style.display = 'none';
    overlayEl.appendChild(labelEl);

    partCameras.push({ camera: partCamera, partScene, partGroup, bbox: partBBox, overlayEl, labelEl, label: p.label });
  }

  const cellObj = { scene, fullCamera, fullControls, fullOverlayEl, cellEl, meshGroup, partCameras, slotName };
  cells.push(cellObj);
  return cellObj;
}

// ── Create shared part-mode master OrbitControls (called once after all panels load) ──
function initPartMasterControls() {
  // Use globalBBox center as the shared orbit target
  const center = globalBBox.getCenter(new THREE.Vector3());
  const size   = globalBBox.getSize(new THREE.Vector3()).length();

  partMasterCamera = new THREE.PerspectiveCamera(45, 1, 0.001, 1000);
  partMasterCamera.position.set(center.x, center.y, center.z + size * 1.2);
  partMasterCamera.lookAt(center);

  // Invisible full-screen dummy element that collects pointer events in Part mode
  partMasterDummy = document.createElement('div');
  partMasterDummy.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:none;cursor:grab;';
  document.body.appendChild(partMasterDummy);
  partMasterDummy.addEventListener('mousedown', () => { partMasterDummy.style.cursor = 'grabbing'; });
  partMasterDummy.addEventListener('mouseup',   () => { partMasterDummy.style.cursor = 'grab'; });

  partMasterControls = new OrbitControls(partMasterCamera, partMasterDummy);
  partMasterControls.target.copy(center);
  partMasterControls.enableDamping = true;
  partMasterControls.dampingFactor = 0.1;
  partMasterControls.update();
}

// ── Layout part sub-cell overlays within each cell (grid, as-square-as-possible) ──
function layoutPartOverlays() {
  const N = parts.length;
  if (N === 0 || cells.length === 0) return;
  const cellRect = cells[0].cellEl.getBoundingClientRect();
  const { rows, cols } = partGridLayout(N, cellRect.width || 1, cellRect.height || 1);
  for (const cell of cells) {
    for (let pi = 0; pi < N; pi++) {
      const pc = cell.partCameras[pi];
      const row = Math.floor(pi / cols);
      const col = pi % cols;
      pc.overlayEl.style.left   = (col / cols * 100).toFixed(4) + '%';
      pc.overlayEl.style.top    = (row / rows * 100).toFixed(4) + '%';
      pc.overlayEl.style.width  = (100 / cols).toFixed(4) + '%';
      pc.overlayEl.style.height = (100 / rows).toFixed(4) + '%';
    }
  }
}

// ── Show/hide overlays and dividers based on mode ──
function applyMode() {
  const N = parts.length;
  // Toggle master dummy overlay
  if (partMasterDummy) partMasterDummy.style.display = showParts ? 'block' : 'none';

  for (const cell of cells) {
    cell.fullOverlayEl.style.display = showParts ? 'none' : 'block';
    for (const pc of cell.partCameras) {
      // Overlays are visual-only (pointer events go to partMasterDummy)
      pc.overlayEl.style.display    = showParts ? 'block' : 'none';
      pc.overlayEl.style.pointerEvents = 'none';
      pc.labelEl.style.display      = showParts ? 'block' : 'none';
    }
    // Remove old dividers
    cell.cellEl.querySelectorAll('.part-divider-h,.part-divider-v').forEach(d => d.remove());
    if (showParts) {
      const cellRect = cell.cellEl.getBoundingClientRect();
      const { rows, cols } = partGridLayout(N, cellRect.width || 1, cellRect.height || 1);
      for (let r = 1; r < rows; r++) {
        const d = document.createElement('div');
        d.className = 'part-divider-h';
        d.style.top = (r / rows * 100).toFixed(4) + '%';
        cell.cellEl.appendChild(d);
      }
      for (let c = 1; c < cols; c++) {
        const d = document.createElement('div');
        d.className = 'part-divider-v';
        d.style.left = (c / cols * 100).toFixed(4) + '%';
        cell.cellEl.appendChild(d);
      }
    }
  }
  if (showParts) {
    layoutPartOverlays();
    // Reset master camera to default framing
    if (partMasterControls && globalBBox) {
      const center = globalBBox.getCenter(new THREE.Vector3());
      const size   = globalBBox.getSize(new THREE.Vector3()).length();
      partMasterControls.target.copy(center);
      partMasterCamera.position.set(center.x, center.y, center.z + size * 1.2);
      partMasterCamera.lookAt(center);
      partMasterControls.update();
    }
  }
}

const assetUrl = (dir, file) => `data/${dir}/${file}`;

async function loadAllPanels() {
  const cellEls = gridEl.querySelectorAll('.cell');
  for (const cellEl of cellEls) {
    const dir = cellEl.dataset.dir;
    const slot = cellEl.dataset.slot;
    const objPath = assetUrl(dir, 'textured.obj');
    const mtlPath = assetUrl(dir, 'textured.mtl');
    let meshGroup;
    try {
      meshGroup = await loadMesh(objPath, mtlPath);
    } catch (e) {
      console.error('mesh load failed', slot, dir, e);
      continue;
    }
    if (!globalBBox) globalBBox = new THREE.Box3().setFromObject(meshGroup);
    createCell(meshGroup, cellEl, slot);
    statusEl.textContent = `Loaded ${cells.length}/6 panels`;
  }
  if (cells.length) {
    activeCellFull = cells[0];
    initPartMasterControls();
  }
}

function renderAll() {
  requestAnimationFrame(renderAll);

  const W = window.innerWidth, H = window.innerHeight;
  if (canvas.width !== W * devicePixelRatio || canvas.height !== H * devicePixelRatio) {
    renderer.setSize(W, H);
  }

  renderer.setScissorTest(false);
  renderer.setClearColor(0x1a1a1a);
  renderer.clear();
  renderer.setScissorTest(true);

  if (!showParts) {
    // ── Full mode: one camera per cell, synchronized orbit ──
    if (cells.length > 0) {
      const master = activeCellFull || cells[0];
      master.fullControls.update();
      const relPos       = master.fullCamera.position.clone().sub(master.fullControls.target);
      const masterTarget = master.fullControls.target.clone();
      for (const c of cells) {
        if (c === master) continue;
        c.fullControls.target.copy(masterTarget);
        c.fullCamera.position.copy(masterTarget).add(relPos);
        c.fullCamera.quaternion.copy(master.fullCamera.quaternion);
        c.fullControls.update();
      }
    }
    for (const c of cells) {
      const rect = c.cellEl.getBoundingClientRect();
      if (rect.bottom < 0 || rect.top > H || rect.right < 0 || rect.left > W) continue;
      if (rect.width <= 0 || rect.height <= 0) continue;
      const x = rect.left, y = H - rect.bottom, w = rect.width, h = rect.height;
      renderer.setViewport(x, y, w, h);
      renderer.setScissor(x, y, w, h);
      c.fullCamera.aspect = w / h;
      c.fullCamera.updateProjectionMatrix();
      renderer.render(c.scene, c.fullCamera);
    }

  } else {
    // ── Part mode: grid of sub-cells per panel, ALL cameras share one orbit ──
    if (!partMasterControls || cells.length === 0) return;
    partMasterControls.update();

    // Copy master orientation to every part camera across every cell
    const masterPos    = partMasterCamera.position.clone();
    const masterQuat   = partMasterCamera.quaternion.clone();
    const masterTarget = partMasterControls.target.clone();

    const N = parts.length;
    for (const c of cells) {
      const cellRect = c.cellEl.getBoundingClientRect();
      if (cellRect.bottom < 0 || cellRect.top > H || cellRect.right < 0 || cellRect.left > W) continue;
      if (cellRect.width <= 0 || cellRect.height <= 0) continue;

      const { rows, cols } = partGridLayout(N, cellRect.width, cellRect.height);
      const subW = cellRect.width  / cols;
      const subH = cellRect.height / rows;

      for (let pi = 0; pi < N; pi++) {
        const pc = c.partCameras[pi];
        const row = Math.floor(pi / cols);
        const col = pi % cols;

        // Each part camera is framed on its own part's bbox center,
        // but rotated/orbited identically to the master.
        const partCenter = (pc.bbox && !pc.bbox.isEmpty())
          ? pc.bbox.getCenter(new THREE.Vector3())
          : globalBBox.getCenter(new THREE.Vector3());
        const partSize = (pc.bbox && !pc.bbox.isEmpty())
          ? pc.bbox.getSize(new THREE.Vector3()).length()
          : globalBBox.getSize(new THREE.Vector3()).length();

        // Compute offset of master camera from its target, then apply to part center
        const offset = masterPos.clone().sub(masterTarget);
        // Scale offset so the part fills the sub-cell nicely
        const masterDist = offset.length();
        const scaledOffset = offset.clone().normalize().multiplyScalar(partSize * 1.2);
        pc.camera.position.copy(partCenter).add(scaledOffset);
        pc.camera.quaternion.copy(masterQuat);

        // DOM sub-cell → WebGL viewport
        const domLeft = cellRect.left + col * subW;
        const domTop  = cellRect.top  + row * subH;
        const x = domLeft;
        const y = H - (domTop + subH);
        const w = subW;
        const h = subH;

        renderer.setViewport(x, y, w, h);
        renderer.setScissor(x, y, w, h);
        pc.camera.aspect = w / h;
        pc.camera.updateProjectionMatrix();
        renderer.render(pc.partScene, pc.camera);
      }
    }
  }
}

(async function init() {
  try {
    await loadAllPanels();
    statusEl.textContent = `Loaded ${cells.length}/6 panels — drag any mesh to rotate`;
    renderAll();
    // Tell parent we are ready (parent owns rank state).
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({
        type: 'viewer-ready',
        hitId, i: trialIdx,
      }, '*');
    }
  } catch (e) {
    console.error(e);
    fail('Load failed: ' + (e && e.message ? e.message : e));
  }
})();
</script>
</body>
</html>
