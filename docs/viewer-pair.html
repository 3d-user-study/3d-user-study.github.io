<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Method Pair Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a1a; color: #eee; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
#main-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
}
#overlay {
  position: relative; z-index: 1; pointer-events: none;
  width: 100%; height: 100vh;
  display: flex;
}
.panel-slot {
  position: relative; pointer-events: auto;
  flex: 1 1 0; height: 100vh;
  border-right: 1px solid #333;
}
.panel-slot:last-child { border-right: none; }
.panel-label {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.7); padding: 4px 14px; border-radius: 12px;
  font-size: 13px; font-weight: bold; z-index: 10; white-space: nowrap;
  pointer-events: none;
}
#status {
  position: fixed; bottom: 10px; left: 20px; font-size: 12px; color: #888; z-index: 100;
  pointer-events: none;
}
.cell-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: auto;
}
</style>
</head>
<body>

<canvas id="main-canvas"></canvas>
<div id="overlay">
  <div class="panel-slot" id="slot-L"><div class="panel-label">Method A</div></div>
  <div class="panel-slot" id="slot-R"><div class="panel-label">Method B</div></div>
</div>
<div id="status">Loading...</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { MTLLoader } from 'three/addons/loaders/MTLLoader.js';

const params = new URLSearchParams(window.location.search);
const hitId  = params.get('hitId');
const dirL   = params.get('dirL');
const dirR   = params.get('dirR');
const vig    = params.get('vig');

if (!dirL || !dirR) {
  document.body.innerText = 'Missing URL parameters (dirL, dirR required)';
  throw new Error('bad params');
}
if (vig && vig !== 'L' && vig !== 'R') {
  document.body.innerText = 'Bad vig parameter';
  throw new Error('bad vig');
}
const DIR_RE = /^[A-Za-z0-9_]+\/[a-f0-9]{16}$/;
if (!DIR_RE.test(dirL) || !DIR_RE.test(dirR)) {
  document.body.innerText = 'Bad dir format';
  throw new Error('bad dir');
}

const PANELS = [
  { dir: dirL, slotId: 'slot-L', label: 'Method A', cell: 'L', gray: vig === 'L' },
  { dir: dirR, slotId: 'slot-R', label: 'Method B', cell: 'R', gray: vig === 'R' },
];

const assetUrl = (dir, file) =>
  `data/${dir}/${file}`;

const canvas = document.getElementById('main-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const statusEl = document.getElementById('status');
let cells = [];
let activeCell = null;
let globalBBox = null;
let hemiLights = [];
const ambientIntensity = 0.8;

function computeSmoothNormals(geometry) {
  const pos = geometry.attributes.position;
  const count = pos.count;
  const numFaces = Math.floor(count / 3);
  const vA = new THREE.Vector3(), vB = new THREE.Vector3(), vC = new THREE.Vector3();
  const e1 = new THREE.Vector3(), e2 = new THREE.Vector3(), fn = new THREE.Vector3();
  const faceNormals = [];
  for (let f = 0; f < numFaces; f++) {
    vA.fromBufferAttribute(pos, f*3);
    vB.fromBufferAttribute(pos, f*3+1);
    vC.fromBufferAttribute(pos, f*3+2);
    e1.subVectors(vB, vA);
    e2.subVectors(vC, vA);
    fn.crossVectors(e1, e2).normalize();
    faceNormals.push(fn.clone());
  }
  const posMap = new Map();
  const prec = 1e5;
  for (let i = 0; i < count; i++) {
    const key = `${Math.round(pos.array[i*3]*prec)},${Math.round(pos.array[i*3+1]*prec)},${Math.round(pos.array[i*3+2]*prec)}`;
    if (!posMap.has(key)) posMap.set(key, []);
    posMap.get(key).push(i);
  }
  const normals = new Float32Array(count * 3);
  const avg = new THREE.Vector3();
  for (const indices of posMap.values()) {
    avg.set(0, 0, 0);
    for (const idx of indices) avg.add(faceNormals[Math.floor(idx/3)]);
    avg.normalize();
    for (const idx of indices) {
      normals[idx*3]   = avg.x;
      normals[idx*3+1] = avg.y;
      normals[idx*3+2] = avg.z;
    }
  }
  geometry.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
}

async function loadMesh(objPath, mtlPath) {
  const group = await new Promise((resolve, reject) => {
    const dir = mtlPath.substring(0, mtlPath.lastIndexOf('/') + 1);
    const file = mtlPath.substring(mtlPath.lastIndexOf('/') + 1);
    const ml = new MTLLoader();
    ml.setPath(dir);
    ml.load(
      file,
      (mats) => {
        mats.preload();
        const ol = new OBJLoader();
        ol.setMaterials(mats);
        ol.load(objPath, resolve, undefined, reject);
      },
      undefined,
      () => { new OBJLoader().load(objPath, resolve, undefined, reject); },
    );
  });
  group.traverse(child => {
    if (child.isMesh) {
      if (!child.geometry.index && child.geometry.attributes.position) {
        computeSmoothNormals(child.geometry);
      } else {
        child.geometry.computeVertexNormals();
      }
      if (child.material) child.material.side = THREE.DoubleSide;
    }
  });
  return group;
}

function applyGrayOverride(group) {
  const grayMat = new THREE.MeshStandardMaterial({
    color: 0x808080,
    roughness: 0.85,
    metalness: 0.0,
    side: THREE.DoubleSide,
  });
  group.traverse((child) => {
    if (child.isMesh) {
      if (child.material) {
        if (child.material.map) child.material.map.dispose();
        child.material.dispose();
      }
      child.material = grayMat;
    }
  });
}

function createScene() {
  const scene = new THREE.Scene();
  const hemi = new THREE.HemisphereLight(0x87CEEB, 0x362e1e, ambientIntensity);
  scene.add(hemi);
  hemiLights.push(hemi);
  const sun  = new THREE.DirectionalLight(0xfff4e0, 1.0); sun.position.set(5, 8, 6);   scene.add(sun);
  const fill = new THREE.DirectionalLight(0xc0d8ff, 0.4); fill.position.set(-4, 2, -3); scene.add(fill);
  const rim  = new THREE.DirectionalLight(0xffffff, 0.2); rim.position.set(0, -3, -5); scene.add(rim);
  return scene;
}

function createCell(meshGroup, slotDiv) {
  const scene = createScene();
  scene.add(meshGroup);

  const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 100);
  const center = globalBBox.getCenter(new THREE.Vector3());
  const size   = globalBBox.getSize(new THREE.Vector3()).length();
  camera.position.set(center.x, center.y, center.z + size * 1.2);
  camera.lookAt(center);

  const controlEl = document.createElement('div');
  controlEl.className = 'cell-overlay';
  slotDiv.appendChild(controlEl);

  const controls = new OrbitControls(camera, controlEl);
  controls.target.copy(center);
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.update();

  const cell = { scene, camera, controls, slotDiv, meshGroup, center, size };

  controlEl.addEventListener('pointerdown', () => { activeCell = cell; });

  cells.push(cell);
  return cell;
}

async function loadPanels() {
  for (const p of PANELS) {
    const slot = document.getElementById(p.slotId);
    const objPath = assetUrl(p.dir, 'textured.obj');
    const mtlPath = assetUrl(p.dir, 'textured.mtl');
    const meshGroup = await loadMesh(objPath, mtlPath);
    if (p.gray) applyGrayOverride(meshGroup);
    if (!globalBBox) globalBBox = new THREE.Box3().setFromObject(meshGroup);
    createCell(meshGroup, slot);
  }
  if (cells.length) activeCell = cells[0];
}

function renderAll() {
  requestAnimationFrame(renderAll);

  if (cells.length > 0) {
    const master = activeCell || cells[0];
    master.controls.update();
    const relPos       = master.camera.position.clone().sub(master.controls.target);
    const masterTarget = master.controls.target.clone();
    for (const c of cells) {
      if (c === master) continue;
      c.controls.target.copy(masterTarget);
      c.camera.position.copy(masterTarget).add(relPos);
      c.camera.quaternion.copy(master.camera.quaternion);
      c.controls.update();
    }
  }

  const W = window.innerWidth, H = window.innerHeight;
  if (canvas.width !== W * devicePixelRatio || canvas.height !== H * devicePixelRatio) {
    renderer.setSize(W, H);
  }

  renderer.setScissorTest(false);
  renderer.setClearColor(0x1a1a1a);
  renderer.clear();
  renderer.setScissorTest(true);

  for (const c of cells) {
    const rect = c.slotDiv.getBoundingClientRect();
    if (rect.bottom < 0 || rect.top > H || rect.right < 0 || rect.left > W) continue;
    const x = rect.left;
    const y = H - rect.bottom;
    const w = rect.width;
    const h = rect.height;
    renderer.setViewport(x, y, w, h);
    renderer.setScissor(x, y, w, h);
    c.camera.aspect = w / h;
    c.camera.updateProjectionMatrix();
    renderer.render(c.scene, c.camera);
  }
}

(async function init() {
  try {
    await loadPanels();
    statusEl.textContent = `Loaded ${cells.length} panels`;
    renderAll();
    window.parent?.postMessage({ type: 'viewer-pair-ready', hitId }, '*');
  } catch (e) {
    statusEl.textContent = 'Load failed';
    console.error(e);
  }
})();
</script>
</body>
</html>
