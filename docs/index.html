<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mesh Texture Comparison Study</title>
<style>
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: #1a1a1a; color: #eee;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  font-size: 14px; line-height: 1.5;
}
.app { display: flex; flex-direction: column; min-height: 100vh; }
.header {
  padding: 12px 24px; background: #222; border-bottom: 1px solid #333;
  display: flex; align-items: center; justify-content: space-between;
}
.header h1 { font-size: 16px; margin: 0; font-weight: 600; }
#progress { font-size: 13px; color: #aaa; }
.screen {
  flex: 1 1 auto; padding: 24px; max-width: 880px; width: 100%;
  margin: 0 auto;
}
.screen-fluid {
  flex: 1 1 auto; padding: 0; max-width: 100%; width: 100%;
  display: flex; flex-direction: column;
}
.viewer-wrap {
  flex: 1 1 auto; position: relative; min-height: 480px;
}
iframe {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  border: 0;
}
.choices {
  display: flex; flex-direction: column; gap: 12px;
  padding: 14px 24px 16px; background: #222; border-top: 1px solid #333;
  flex: 0 0 auto;
}
.rank-section {
  display: flex; align-items: center; gap: 16px; justify-content: center;
}
.rank-edge {
  font-size: 12px; font-weight: 700; color: #aaa;
  letter-spacing: 0.5px; min-width: 60px;
}
.rank-edge.left  { text-align: right; color: #6cf08c; }
.rank-edge.right { text-align: left;  color: #ff8a8a; }
.rank-strip {
  display: flex; gap: 8px; list-style: none; padding: 0; margin: 0;
}
.rank-chip {
  width: 56px; height: 48px; border-radius: 6px;
  background: #2f2f2f; border: 1px solid #444;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: grab; user-select: none;
  position: relative;
  transition: background 80ms, border-color 80ms;
}
.rank-chip:hover { background: #3a3a3a; border-color: #666; }
.rank-chip:active { cursor: grabbing; }
.rank-chip-letter {
  font-size: 18px; font-weight: 700; color: #fff;
  line-height: 1;
}
.rank-chip-pos {
  font-size: 10px; color: #888; margin-top: 2px;
  line-height: 1;
}
.rank-chip-ghost { opacity: 0.4; }
.rank-chip-chosen { background: rgba(42,100,214,0.35); border-color: #2a64d6; }
.action-row {
  display: flex; align-items: center; gap: 16px; justify-content: center;
}
.btn {
  padding: 10px 28px; font-size: 15px; cursor: pointer;
  background: #2a64d6; color: white; border: 0; border-radius: 6px;
  font-weight: 600; min-width: 160px;
}
.btn:hover:not(:disabled) { background: #3a78ea; }
.btn.secondary { background: #444; }
.btn.secondary:hover:not(:disabled) { background: #555; }
.btn:disabled { background: #333; color: #888; cursor: not-allowed; }
.choice-info {
  font-size: 13px; color: #aaa; min-width: 220px; text-align: left;
}
.choice-info b { color: #fff; font-weight: 600; }
h2 { margin: 0 0 12px; font-size: 22px; }
h3 { margin: 16px 0 8px; font-size: 16px; }
p { margin: 0 0 12px; }
.consent {
  background: #2a2a2a; padding: 16px; border-radius: 6px; margin: 16px 0;
  max-height: 320px; overflow-y: auto;
}
ul { margin: 8px 0 12px 24px; }
li { margin: 4px 0; }
.checkbox-row { margin: 16px 0; display: flex; align-items: center; gap: 8px; }
.error { color: #ff6b6b; padding: 16px; background: #2a1a1a; border-radius: 6px; }
.muted { color: #888; font-size: 13px; }
.notice {
  background: #1f3a5f; padding: 12px; border-left: 4px solid #2a64d6;
  margin: 12px 0; border-radius: 0 4px 4px 0;
}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <h1>Mesh Texture Comparison Study</h1>
    <div id="progress"></div>
  </div>
  <div class="screen" id="screen"><p>Loading…</p></div>
</div>

<form id="mturkForm" method="POST" style="display:none">
  <input type="hidden" name="assignmentId" id="f_assignmentId">
  <input type="hidden" name="hitId"        id="f_hitId">
  <input type="hidden" name="workerId"     id="f_workerId">
</form>

<!-- UniqueTurker (myleott.com) shut down in 2022. We replace the remote
     repeat-participation gate with a best-effort client-side localStorage
     check (mark on submit, refuse on repeat load). This is bypassable by
     clearing cache / different browser / different device. The README's
     "Limitations" section documents the post-hoc workerId-cap filter that
     scripts/reconcile.py applies for true enforcement. -->

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<script type="module">
const UT_ID = 'spotex_texture_v1_20260509';

// Best-effort: prevents the same browser+workerId from submitting more than
// one HIT under this UT_ID. Cleared cache / different browser / different
// device bypasses; we accept that and rely on reconcile.py for the real cap.
function utStorageKey(uid, wid) { return `ut:${uid}:${wid || 'anon'}`; }
function utWorkerHasSubmitted(uid, wid) {
  try { return localStorage.getItem(utStorageKey(uid, wid)) === '1'; }
  catch (e) { return false; }
}
function utMarkWorkerSubmitted(uid, wid) {
  try { localStorage.setItem(utStorageKey(uid, wid), '1'); }
  catch (e) { /* localStorage disabled; best-effort skip */ }
}

const url = new URL(location.href);
const hitId        = url.searchParams.get('hitId');
const assignmentId = url.searchParams.get('assignmentId');
const workerId     = url.searchParams.get('workerId') || '';
const turkSubmitTo = url.searchParams.get('turkSubmitTo')
  || 'https://www.mturk.com';

const screenEl   = document.getElementById('screen');
const progressEl = document.getElementById('progress');
const appEl      = document.getElementById('app');

const ORDER_RE = /^[A-F]{6}$/;
function isValidOrder(s) {
  if (typeof s !== 'string' || !ORDER_RE.test(s)) return false;
  const seen = new Set();
  for (const ch of s) {
    if (seen.has(ch)) return false;
    seen.add(ch);
  }
  return seen.size === 6;
}

function fail(msg) {
  screenEl.className = 'screen';
  screenEl.innerHTML = `<div class="error">${msg}</div>`;
  progressEl.textContent = '';
}

function isPreview() {
  return !assignmentId || assignmentId === 'ASSIGNMENT_ID_NOT_AVAILABLE';
}

if (!hitId) {
  fail('Missing hitId. Please return this HIT and accept it from MTurk.');
  throw new Error('no hitId');
}

if (!isPreview() && utWorkerHasSubmitted(UT_ID, workerId)) {
  fail('You have already participated in this study. Please return this HIT.');
  throw new Error('UT limit');
}

const trialMap = await fetch('trialMap.json').then(r => {
  if (!r.ok) throw new Error('trialMap fetch failed: ' + r.status);
  return r.json();
});

const myTrials = trialMap[hitId];
if (!Array.isArray(myTrials) || myTrials.length !== 25) {
  fail('Invalid HIT ID. Please return this HIT and accept it from MTurk again.');
  throw new Error('bad hitId or trial count');
}

const tutorialEntries = trialMap['H_TUTORIAL'];
if (!Array.isArray(tutorialEntries) || tutorialEntries.length < 1) {
  fail('Tutorial entry missing. Please contact the requester.');
  throw new Error('no tutorial');
}

const selections = new Array(25).fill(null);  // each entry: 6-char rank string

// Track which trial the iframe last reported as ready, so the Submit button
// is only enabled once the worker can actually see the meshes.
let viewerReadyKey = null;
let currentSortable = null;

window.addEventListener('message', (ev) => {
  const d = ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.type !== 'viewer-ready') return;
  if (typeof d.hitId !== 'string' || !Number.isInteger(d.i)) return;
  viewerReadyKey = `${d.hitId}|${d.i}`;
  const btn = document.getElementById('next_btn');
  if (btn && btn.dataset.expectedKey === viewerReadyKey) {
    btn.disabled = false;
    updateRankBadge();
  }
});

function buildViewerUrl(hid, i) {
  const u = new URL('viewer-rank.html', location.href);
  u.searchParams.set('hitId', hid);
  u.searchParams.set('i', String(i));
  return u.toString();
}

function getTrialSlots(hid, idx) {
  const trials = trialMap[hid];
  if (!Array.isArray(trials) || idx < 0 || idx >= trials.length) return null;
  const t = trials[idx];
  if (!t || !Array.isArray(t.slots) || t.slots.length !== 6) return null;
  return t.slots;
}

function currentOrderFromStrip() {
  const strip = document.getElementById('rank_strip');
  if (!strip) return null;
  const chips = strip.querySelectorAll('.rank-chip');
  return Array.from(chips).map(c => c.dataset.slot).join('');
}

function updateRankBadge() {
  const badge = document.getElementById('rank_badge');
  const order = currentOrderFromStrip();
  if (!badge) return;
  if (!order) {
    badge.textContent = 'Loading meshes…';
    return;
  }
  const pretty = order.split('').join(' › ');
  badge.innerHTML = `Current rank (best → worst): <b>${pretty}</b>`;
}

function updateChipPositions() {
  const strip = document.getElementById('rank_strip');
  if (!strip) return;
  const chips = strip.querySelectorAll('.rank-chip');
  chips.forEach((c, i) => {
    const posEl = c.querySelector('.rank-chip-pos');
    if (posEl) posEl.textContent = `#${i + 1}`;
  });
}

function renderRankStrip(slots) {
  // Server-given slot order is the initial rank (left = best).
  const items = slots.map(s => `
    <li class="rank-chip" data-slot="${s.slot}" title="Drag to reorder">
      <div class="rank-chip-letter">${s.slot}</div>
      <div class="rank-chip-pos">#1</div>
    </li>
  `).join('');
  return `
    <div class="rank-section">
      <div class="rank-edge left">BEST</div>
      <ul class="rank-strip" id="rank_strip">${items}</ul>
      <div class="rank-edge right">WORST</div>
    </div>
  `;
}

function attachSortable() {
  const strip = document.getElementById('rank_strip');
  if (!strip) return;
  // Previous Sortable's element was wiped by screenEl.innerHTML; SortableJS
  // throws inside destroy() when its bound element is no longer in the DOM.
  // We don't actually need to destroy a stale instance (it's already
  // unreachable and will be GC'd) — just drop the reference.
  currentSortable = null;
  currentSortable = Sortable.create(strip, {
    animation: 160,
    ghostClass: 'rank-chip-ghost',
    chosenClass: 'rank-chip-chosen',
    onSort: () => {
      updateChipPositions();
      updateRankBadge();
    },
  });
  updateChipPositions();
}

const renderConsent = () => {
  screenEl.className = 'screen';
  screenEl.innerHTML = `
    <h2>Consent &amp; Instructions</h2>

    <p>You will compare <b>six</b> 3D textured meshes per trial and
    <b>rank them</b> from best to worst by how well their texture matches
    a written prompt.

    <h3>What you will do</h3>
    <ul>
      <li>1 short tutorial trial (does not count toward your reward).</li>
      <li>25 trials. Each trial shows the same 3D shape rendered with six
      different textures, arranged in a <b>3×2 grid</b> and labeled
      <b>A</b>–<b>F</b>.</li>
      <li>Read the prompt at the top (a full sentence plus per-part
      captions describing the intended look).</li>
      <li>Below the grid are six rank chips labeled A–F. <b>Drag the chips
      left-to-right</b> so the best texture is on the left and the worst
      is on the right.</li>
      <li>You can rotate / zoom any mesh in the grid; all six views stay
      synchronized.</li>
    </ul>

    <h3>Quality checks</h3>
    <p>Some trials contain an obviously corrupted texture that any
    attentive worker would rank last (worst). These are attention
    checks. <b>If you fail any of the attention checks, your
    submission will be rejected and you will not be paid.</b></p>

    <div class="consent">
      <p><b>Eligibility.</b> You must be 18 or older.</p>
      <p><b>Risks.</b> None beyond ordinary screen use.</p>
      <p><b>Privacy.</b> We record only your MTurk worker ID, your 25
      rankings, and your timing. No personal data is collected.</p>
      <p><b>Voluntary.</b> You may stop at any time by closing the browser
      tab; in that case the HIT will not submit and you will not be paid.</p>
      <p><b>Contact.</b> Questions: <a href="mailto:kkh23834022@gmail.com"
      style="color:#9ac0ff">kkh23834022@gmail.com</a>.</p>
    </div>

    <div class="checkbox-row">
      <input type="checkbox" id="consent_box">
      <label for="consent_box">I am 18+ and I consent to participate.</label>
    </div>

    ${isPreview() ? `
      <div class="notice">
        Preview mode: accept the HIT in MTurk to start.
      </div>
      <button class="btn" disabled>Start (preview)</button>
    ` : `
      <button class="btn" id="start_btn" disabled>Start tutorial</button>
    `}
  `;

  if (!isPreview()) {
    const cb  = screenEl.querySelector('#consent_box');
    const btn = screenEl.querySelector('#start_btn');
    cb.addEventListener('change', () => { btn.disabled = !cb.checked; });
    btn.addEventListener('click', renderTutorial);
  }
};

const renderTutorial = () => {
  progressEl.textContent = 'Tutorial';
  viewerReadyKey = null;

  const tutSlots = getTrialSlots('H_TUTORIAL', 0);
  if (!tutSlots) { fail('Tutorial slots missing or malformed.'); return; }

  const tutUrl = buildViewerUrl('H_TUTORIAL', 0);
  const expectedKey = 'H_TUTORIAL|0';

  screenEl.className = 'screen-fluid';
  screenEl.innerHTML = `
    <div class="viewer-wrap">
      <iframe id="vf" src="${tutUrl}"></iframe>
    </div>
    <div class="choices">
      ${renderRankStrip(tutSlots)}
      <div class="action-row">
        <div class="choice-info" id="rank_badge">Loading meshes…</div>
        <button class="btn" id="next_btn" data-expected-key="${expectedKey}" disabled>Finish tutorial</button>
      </div>
    </div>
  `;
  attachSortable();
  updateRankBadge();
  document.getElementById('next_btn').addEventListener('click', () => {
    renderTrial(0);
  });
};

const renderTrial = (idx) => {
  if (idx >= 25) { renderDone(); return; }
  viewerReadyKey = null;

  const slots = getTrialSlots(hitId, idx);
  if (!slots) { fail('Trial slots missing or malformed.'); return; }

  const trialUrl = buildViewerUrl(hitId, idx);
  const expectedKey = `${hitId}|${idx}`;

  progressEl.textContent = `Trial ${idx + 1} of 25`;
  screenEl.className = 'screen-fluid';
  screenEl.innerHTML = `
    <div class="viewer-wrap">
      <iframe id="vf" src="${trialUrl}"></iframe>
    </div>
    <div class="choices">
      ${renderRankStrip(slots)}
      <div class="action-row">
        <div class="choice-info" id="rank_badge">Loading meshes…</div>
        <button class="btn" id="next_btn" data-expected-key="${expectedKey}" disabled>${idx === 24 ? 'Submit ranking & finish' : 'Submit ranking & next'}</button>
      </div>
    </div>
  `;
  attachSortable();
  updateRankBadge();
  document.getElementById('next_btn').addEventListener('click', () => {
    const order = currentOrderFromStrip();
    if (!isValidOrder(order)) {
      // Should not happen: 6 chips are always present in a unique permutation.
      return;
    }
    if (viewerReadyKey !== expectedKey) return;
    selections[idx] = order;
    renderTrial(idx + 1);
  });
};

const renderDone = () => {
  progressEl.textContent = 'All trials complete';
  screenEl.className = 'screen';
  screenEl.innerHTML = `
    <h2>All done — thank you!</h2>
    <p>Click <b>Submit HIT</b> to send your rankings to MTurk and finish.</p>
    <p class="muted">After submission MTurk will display its standard
    completion page. The requester will review and approve within 48 hours.</p>
    <button class="btn" id="submit_btn">Submit HIT</button>
    <button class="btn secondary" id="back_btn" style="margin-left:8px">
      Review last trial
    </button>
  `;
  screenEl.querySelector('#back_btn').addEventListener('click', () => {
    renderTrial(24);
  });
  screenEl.querySelector('#submit_btn').addEventListener('click', submitHIT);
};

function submitHIT() {
  if (selections.some(v => !isValidOrder(v))) {
    fail('Internal error: missing or invalid rankings.');
    return;
  }

  const form = document.getElementById('mturkForm');
  form.action = `${turkSubmitTo}/mturk/externalSubmit`;
  document.getElementById('f_assignmentId').value = assignmentId || '';
  document.getElementById('f_hitId').value        = hitId;
  document.getElementById('f_workerId').value     = workerId;

  for (let i = 0; i < 25; i++) {
    const inp = document.createElement('input');
    inp.type = 'hidden';
    inp.name = `rank${i + 1}`;
    inp.value = selections[i];
    form.appendChild(inp);
  }
  utMarkWorkerSubmitted(UT_ID, workerId);
  form.submit();
}

renderConsent();
</script>
</body>
</html>
